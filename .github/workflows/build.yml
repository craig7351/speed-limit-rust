name: Build and Release

on:
  push:
    branches: [ "main", "master" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install -r requirements.txt
    
    - name: Download WinDivert
      run: |
        Invoke-WebRequest -Uri "https://github.com/basil00/WinDivert/releases/download/v2.2.2/WinDivert-2.2.2-A.zip" -OutFile "WinDivert.zip"
        Expand-Archive -Path "WinDivert.zip" -DestinationPath "WinDivert"
    
    - name: Build EXE
      run: |
        pyinstaller --noconfirm --onefile --windowed --name "SpeedLimit" `
          --add-binary "WinDivert/WinDivert-2.2.2-A/x64/WinDivert.dll;." `
          --add-binary "WinDivert/WinDivert-2.2.2-A/x64/WinDivert64.sys;." `
          --uac-admin `
          main.py

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: SpeedLimit-Windows
        path: dist/SpeedLimit.exe
        retention-days: 5

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: dist/SpeedLimit.exe
        generate_release_notes: true
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
