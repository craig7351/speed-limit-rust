name: Build and Release

on:
  push:
    branches: [ "main", "master" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Cache cargo registry & build
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: ${{ runner.os }}-cargo-

    - name: Download WinDivert
      run: |
        Invoke-WebRequest -Uri "https://github.com/basil00/WinDivert/releases/download/v2.2.2/WinDivert-2.2.2-A.zip" -OutFile "WinDivert.zip"
        Expand-Archive -Path "WinDivert.zip" -DestinationPath "WinDivert-dist"

    - name: Build release
      run: cargo build --release

    - name: Prepare release package
      run: |
        New-Item -ItemType Directory -Path "release" -Force
        Copy-Item "target/release/speed-limit.exe" "release/"
        Copy-Item "WinDivert-dist/WinDivert-2.2.2-A/x64/WinDivert.dll" "release/"
        Copy-Item "WinDivert-dist/WinDivert-2.2.2-A/x64/WinDivert64.sys" "release/"
        Copy-Item "README.md" "release/"
        Compress-Archive -Path "release/*" -DestinationPath "SpeedLimit-Windows-x64.zip"

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: SpeedLimit-Windows-x64
        path: SpeedLimit-Windows-x64.zip
        retention-days: 5

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: SpeedLimit-Windows-x64.zip
        generate_release_notes: true
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
